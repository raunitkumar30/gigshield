<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Claims | GigShield Rider</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/my_claims.css">
</head>

<body>
    <!-- Auth guard -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/env.js"></script>
    <script src="js/store.js"></script>

    <header class="flex items-center justify-between px-8 py-4 border-b border-slate-900 bg-slate-950/50">
        <div class="flex items-center space-x-3">
            <div class="p-1.5 bg-teal-500/10 rounded-lg border border-teal-500/20">
                <i data-lucide="shield" class="w-5 h-5 text-teal-400"></i>
            </div>
            <h1 class="text-lg font-bold tracking-tight">GigShield</h1>
            <span
                class="bg-amber-500/10 text-amber-500 text-[9px] font-bold px-2 py-0.5 rounded border border-amber-500/20 uppercase">Rider</span>
        </div>

        <div class="flex items-center space-x-6 relative">
            <button id="profile-toggle" class="focus:outline-none">
                <div id="user-avatar"
                    class="w-9 h-9 rounded-full bg-amber-500/20 flex items-center justify-center text-amber-500 font-bold text-sm hover:ring-4 hover:ring-amber-500/10 transition-all cursor-pointer">
                    ?
                </div>
            </button>

            <div id="profile-menu"
                class="hidden absolute right-0 top-12 w-56 bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl z-50 overflow-hidden">
                <div class="p-4 border-b border-slate-800 bg-slate-800/30">
                    <p id="menu-user-name" class="text-sm font-bold text-white truncate">Rider</p>
                    <p id="menu-user-email" class="text-[10px] text-gray-500 truncate">email@example.com</p>
                </div>
                <div class="p-2">
                    <a href="#"
                        class="flex items-center space-x-3 px-3 py-2.5 rounded-xl text-gray-400 hover:bg-slate-800 hover:text-white transition-all text-xs">
                        <i data-lucide="user" class="w-4 h-4"></i>
                        <span>My Profile</span>
                    </a>
                    <button id="logout-btn"
                        class="w-full flex items-center space-x-3 px-3 py-2.5 rounded-xl text-rose-500 hover:bg-rose-500/10 transition-all text-xs font-bold text-left">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        <span>Logout</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <nav class="px-8 border-b border-slate-900 flex space-x-10">
        <a href="rider_dashboard.html" class="nav-tab">
            <i data-lucide="shield-check" class="w-4 h-4 mr-2"></i> My Coverage
        </a>
        <a href="my_claims.html" class="nav-tab active">
            <i data-lucide="file-text" class="w-4 h-4 mr-2"></i> My Claims
        </a>
        <a href="rider_payments.html" class="nav-tab">
            <i data-lucide="credit-card" class="w-4 h-4 mr-2"></i> Payments
        </a>
    </nav>

    <main class="p-8 max-w-6xl mx-auto">

        <!-- Stats Row -->
        <div class="flex space-x-6 mb-10">
            <div class="card-stat">
                <p id="stat-total-claims" class="text-4xl font-bold text-teal-400">0</p>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-2">Total Claims</p>
            </div>
            <div class="card-stat">
                <p id="stat-total-received" class="text-4xl font-bold text-gold">₹0</p>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-2">Total Received</p>
            </div>
            <div class="card-stat">
                <p id="stat-approval-rate" class="text-4xl font-bold text-emerald-500">0%</p>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-2">Auto-Approval Rate</p>
            </div>
        </div>

        <!-- Claims Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Event</th>
                        <th>Date</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>UPI Ref</th>
                    </tr>
                </thead>
                <tbody id="claims-tbody">
                    <!-- Populated dynamically -->
                </tbody>
            </table>
        </div>

    </main>

    <script src="js/my_claims.js" defer></script>
</body>

</html>
